name: Release

# Builds cross-platform abi3 wheels + sdist and publishes to PyPI via
# Trusted Publishing (OIDC — no API token stored in the repo).
#
# Trigger:
#   - publishing a GitHub Release  -> build + publish to PyPI
#   - manual "Run workflow"        -> build + publish (after PyPI is configured)

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  wheels:
    name: wheels (${{ matrix.platform.target }} · ${{ matrix.platform.runner }})
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { runner: ubuntu-latest, target: x86_64, manylinux: auto }
          - { runner: ubuntu-latest, target: aarch64, manylinux: auto }
          # Both macOS wheels build on the arm64 runner; x86_64 is
          # cross-compiled to avoid the scarce Intel (macos-13) runners.
          - { runner: macos-14, target: x86_64, manylinux: "" }
          - { runner: macos-14, target: aarch64, manylinux: "" }
          - { runner: windows-latest, target: x64, manylinux: "" }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          manylinux: ${{ matrix.platform.manylinux }}
          args: --release --out dist
          sccache: "true"
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.platform.runner }}-${{ matrix.platform.target }}
          path: dist

  wheels-freethreaded:
    # Free-threaded (no-GIL) CPython does not support the stable ABI, so these
    # are version-specific cp313t wheels (separate from the abi3 ones above).
    # The Rust core declares free-threaded support via `m.gil_used(false)`.
    name: free-threaded wheels (cp313t · ${{ matrix.platform.target }})
    runs-on: ${{ matrix.platform.runner }}
    # Linux/manylinux free-threaded builds are still flaky (maturin + old
    # manylinux images), so they are best-effort and must not block the release;
    # macOS/Windows free-threaded and all the abi3 wheels still publish.
    continue-on-error: ${{ matrix.platform.optional || false }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { runner: ubuntu-latest, target: x86_64, manylinux: 2_28, optional: true }
          - { runner: ubuntu-latest, target: aarch64, manylinux: 2_28, optional: true }
          - { runner: macos-14, target: aarch64, manylinux: "" }
          - { runner: windows-latest, target: x64, manylinux: "" }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13t"
      - name: Build free-threaded wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          manylinux: ${{ matrix.platform.manylinux }}
          args: --release --out dist --interpreter python3.13t
          sccache: "true"
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-ft-${{ matrix.platform.runner }}-${{ matrix.platform.target }}
          path: dist

  sdist:
    name: source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  publish:
    name: Publish to PyPI
    needs: [wheels, wheels-freethreaded, sdist]
    runs-on: ubuntu-latest
    # A dedicated environment lets PyPI scope the trusted publisher.
    environment:
      name: pypi
      url: https://pypi.org/project/swarmstate/
    permissions:
      id-token: write # required for OIDC Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
