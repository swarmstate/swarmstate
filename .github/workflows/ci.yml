name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust core (cargo test)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test
        run: cargo test --all --verbose

  python:
    name: Python API (pytest)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install test deps
        run: python -m pip install --upgrade pip pytest
      - name: Build and install swarmstate (maturin backend)
        run: python -m pip install .
      - name: pytest
        run: pytest -q

  integrations:
    name: Integrations (LangGraph · Redis · CrewAI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install swarmstate + extras + test deps
        run: |
          python -m pip install --upgrade pip pytest
          python -m pip install ".[langgraph,redis]" fakeredis
      - name: pytest (adapters & backends)
        run: pytest -q tests/test_langgraph.py tests/test_langgraph_contract.py tests/test_redis.py tests/test_crewai.py tests/test_disk.py tests/test_observability.py tests/test_examples.py

  postgres:
    name: Postgres backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready --health-interval 5s
          --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install swarmstate + postgres/langgraph extras
        run: |
          python -m pip install --upgrade pip pytest
          python -m pip install ".[postgres,langgraph]"
      - name: pytest (Postgres backend)
        env:
          SWARMSTATE_TEST_PG_DSN: postgresql://postgres:postgres@localhost:5432/postgres
        run: pytest -q tests/test_postgres.py

  lint:
    name: Lint (ruff + cargo fmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: ruff
        run: |
          python -m pip install --upgrade pip ruff
          ruff check python tests examples benchmarks
          ruff format --check python tests examples
      - name: mypy (strict, own package)
        run: |
          python -m pip install mypy
          mypy
